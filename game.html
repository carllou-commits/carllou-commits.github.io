<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Dash-like Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #000;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 2px solid #FFF;
            background: #000;
        }
        #instructions {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #FFF;
        }
    </style>
</head>
<body>
    <div id="instructions">Tap SPACE to jump! Avoid obstacles!</div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let player = { x: 50, y: 300, width: 20, height: 20, dy: 0, jumpPower: -12, gravity: 0.6, onGround: true };
        let obstacles = [];
        let score = 0;
        let gameRunning = true;
        let speed = 6;
        let won = false;
        let lastSpikes = 0;

        function drawPlayer() {
            ctx.fillStyle = '#00FFFF';
            ctx.fillRect(player.x, player.y, player.width, player.height);
        }

        function drawObstacle(obstacle) {
            if (obstacle.type === 'block') {
                ctx.fillStyle = '#FF0000';
                ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
            } else if (obstacle.type === 'spike') {
                ctx.fillStyle = '#FFFF00';
                ctx.beginPath();
                ctx.moveTo(obstacle.x, obstacle.y + obstacle.height);
                ctx.lineTo(obstacle.x + obstacle.width / 2, obstacle.y);
                ctx.lineTo(obstacle.x + obstacle.width, obstacle.y + obstacle.height);
                ctx.closePath();
                ctx.fill();
            }
        }

        function drawGround() {
            ctx.fillStyle = '#555';
            ctx.fillRect(0, 350, canvas.width, 50);
        }

        function update() {
            if (!gameRunning) return;

            player.y += player.dy;
            player.dy += player.gravity;

            let landedOnBlock = false;
            obstacles.forEach(obstacle => {
                if (obstacle.type === 'block' && player.dy > 0 &&
                    player.x < obstacle.x + obstacle.width &&
                    player.x + player.width > obstacle.x &&
                    player.y + player.height >= obstacle.y &&
                    player.y + player.height <= obstacle.y + obstacle.height) {
                    player.y = obstacle.y - player.height;
                    player.dy = 0;
                    player.onGround = true;
                    landedOnBlock = true;
                }
            });

            if (!landedOnBlock && player.y >= 330) {
                player.y = 330;
                player.dy = 0;
                player.onGround = true;
            } else if (!landedOnBlock) {
                player.onGround = false;
            }

            obstacles.forEach(obstacle => {
                obstacle.x -= speed;
                if (obstacle.x + obstacle.width < 0) {
                    obstacles.shift();
                    score++;
                    if (score >= 20) {
                        gameRunning = false;
                        won = true;
                    }
                    speed += 0.1; // Increase speed over time
                }
                // Collision detection
                let collision = player.x < obstacle.x + obstacle.width &&
                    player.x + player.width > obstacle.x &&
                    player.y < obstacle.y + obstacle.height &&
                    player.y + player.height > obstacle.y;
                if (collision && obstacle.type === 'spike') {
                    gameRunning = false;
                }
            });

            // Generate obstacles
            if (Math.random() < 0.02) {
                let type = Math.random() < 0.5 ? 'block' : 'spike';
                if (type === 'spike' && lastSpikes >= 3) type = 'block';
                let y = 320; // Both on ground
                obstacles.push({ x: 800, y: y, width: 30, height: 30, type: type });
                if (type === 'spike') lastSpikes++; else lastSpikes = 0;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGround();
            drawPlayer();
            obstacles.forEach(drawObstacle);
            ctx.fillStyle = '#FFF';
            ctx.font = '20px Arial';
            ctx.fillText('Score: ' + score, 10, 30);
            if (!gameRunning) {
                if (won) {
                    ctx.fillText('You Win!', 350, 200);
                } else {
                    ctx.fillText('Game Over! Press R to Restart', 300, 200);
                }
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && player.onGround) {
                player.dy = player.jumpPower;
                player.onGround = false;
            }
            if (e.code === 'KeyR' && !gameRunning) {
                player.y = 300;
                player.dy = 0;
                player.onGround = true;
                obstacles = [];
                score = 0;
                speed = 6;
                gameRunning = true;
                won = false;
                lastSpikes = 0;
            }
        });

        gameLoop();
    </script>
</body>
</html>
